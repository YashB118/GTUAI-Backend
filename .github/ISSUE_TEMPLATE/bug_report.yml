name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Describe the bug. Include the route or feature affected.
      placeholder: When I click Generate on a Brahmastra question, the answer sheet stays in the loading skeleton forever.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Log in as a student
        2. Open /brahmastra/<subject_id>
        3. Click any question card
        4. Observe ...
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: Chrome 130 / macOS 15 / production / self-hosted
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Console / network logs
      description: Paste any browser-console errors or failing network requests. Redact tokens.
      render: shell
    validations:
      required: false
